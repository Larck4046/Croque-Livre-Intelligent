<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Caméra - Croque-Livre</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-section {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        h2 { color: #666; margin-top: 20px; }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        #video-container {
            margin: 20px 0;
            width: 100%;
            max-width: 500px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        #camera-feed {
            width: 100%;
            height: 400px;
            display: block;
            background: #000;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-weight: bold;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <h1>🎥 Test de Caméra - Croque-Livre</h1>
    
    <div class="test-section">
        <h2>Vérifications Préalables</h2>
        <div id="checks"></div>
    </div>
    
    <div class="test-section">
        <h2>Test de Caméra Direct (getUserMedia)</h2>
        <button id="start-camera-btn">Démarrer la Caméra</button>
        <button id="stop-camera-btn" disabled>Arrêter</button>
        <div id="video-container" style="display: none;">
            <video id="camera-feed"></video>
        </div>
        <div id="camera-status"></div>
    </div>
    
    <div class="test-section">
        <h2>Test Quagga.js</h2>
        <button id="start-quagga-btn">Démarrer Quagga</button>
        <button id="stop-quagga-btn" disabled>Arrêter</button>
        <div id="quagga-container" style="display: none; width: 100%; max-width: 500px; height: 400px; background: #000; border-radius: 8px; overflow: hidden; margin: 20px 0;"></div>
        <div id="quagga-status"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
    <script>
        // Vérifications initiales
        function runChecks() {
            const checksDiv = document.getElementById('checks');
            let html = '';
            
            // Vérifier HTTPS
            const isHttps = window.location.protocol === 'https:';
            html += `<div class="status ${isHttps ? 'success' : 'error'}">
                ${isHttps ? '✓' : '✗'} HTTPS: ${isHttps ? 'OUI' : 'NON (requis pour la caméra)'}
            </div>`;
            
            // Vérifier getUserMedia
            const hasGetUserMedia = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
            html += `<div class="status ${hasGetUserMedia ? 'success' : 'error'}">
                ${hasGetUserMedia ? '✓' : '✗'} getUserMedia: ${hasGetUserMedia ? 'Disponible' : 'Indisponible'}
            </div>`;
            
            // Vérifier Quagga
            const hasQuagga = typeof Quagga !== 'undefined';
            html += `<div class="status ${hasQuagga ? 'success' : 'error'}">
                ${hasQuagga ? '✓' : '✗'} Quagga.js: ${hasQuagga ? 'Chargé' : 'Non chargé'}
            </div>`;
            
            checksDiv.innerHTML = html;
        }
        
        // Test de caméra direct
        document.getElementById('start-camera-btn').addEventListener('click', async function() {
            const statusDiv = document.getElementById('camera-status');
            const videoContainer = document.getElementById('video-container');
            const video = document.getElementById('camera-feed');
            
            try {
                statusDiv.innerHTML = '<div class="status info">⏳ Accès à la caméra...</div>';
                
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "environment",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                video.play();
                videoContainer.style.display = 'block';
                statusDiv.innerHTML = '<div class="status success">✓ Caméra active!</div>';
                
                document.getElementById('start-camera-btn').disabled = true;
                document.getElementById('stop-camera-btn').disabled = false;
                
                window.cameraStream = stream;
            } catch (err) {
                statusDiv.innerHTML = `<div class="status error">✗ Erreur: ${err.name} - ${err.message}</div>`;
                console.error('Erreur caméra:', err);
            }
        });
        
        document.getElementById('stop-camera-btn').addEventListener('click', function() {
            if (window.cameraStream) {
                window.cameraStream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('camera-status').innerHTML = '<div class="status info">Caméra arrêtée</div>';
            document.getElementById('start-camera-btn').disabled = false;
            document.getElementById('stop-camera-btn').disabled = true;
        });
        
        // Test Quagga
        document.getElementById('start-quagga-btn').addEventListener('click', function() {
            const statusDiv = document.getElementById('quagga-status');
            const container = document.getElementById('quagga-container');
            
            statusDiv.innerHTML = '<div class="status info">⏳ Initialisation de Quagga...</div>';
            container.style.display = 'block';
            
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: container,
                    constraints: {
                        facingMode: "environment",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                },
                decoder: {
                    readers: ["ean_reader", "ean_8_reader", "code_128_reader", "upc_reader"]
                }
            }, function(err) {
                if (err) {
                    statusDiv.innerHTML = `<div class="status error">✗ Erreur Quagga: ${err.message || err}</div>`;
                    console.error('Erreur Quagga:', err);
                    return;
                }
                
                statusDiv.innerHTML = '<div class="status success">✓ Quagga initialisé et en cours d\'exécution!</div>';
                Quagga.start();
                
                document.getElementById('start-quagga-btn').disabled = true;
                document.getElementById('stop-quagga-btn').disabled = false;
            });
            
            Quagga.onDetected(function(result) {
                if (result.codeResult) {
                    console.log('Code détecté:', result.codeResult.code);
                    statusDiv.innerHTML = `<div class="status success">✓ Code détecté: <strong>${result.codeResult.code}</strong></div>`;
                }
            });
        });
        
        document.getElementById('stop-quagga-btn').addEventListener('click', function() {
            Quagga.stop();
            document.getElementById('quagga-container').style.display = 'none';
            document.getElementById('quagga-status').innerHTML = '<div class="status info">Quagga arrêté</div>';
            document.getElementById('start-quagga-btn').disabled = false;
            document.getElementById('stop-quagga-btn').disabled = true;
        });
        
        // Lancer les vérifications au chargement
        window.addEventListener('DOMContentLoaded', runChecks);
    </script>
</body>
</html>
