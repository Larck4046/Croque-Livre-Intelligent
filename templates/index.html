<!DOCTYPE html>
<html lang="fr">
<title>Croque-Livre</title>

<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
<script src="{{ url_for('static', filename='app.js') }}"></script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croque-Livre — Catalogue</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>📚 Catalogue Croque-Livre</h1>
    </header>

    <main>

        <!-- Liste des livres -->
        <section id="books-section">
            <h2>Livres disponibles</h2>
            <div id="books-container" class="grid"></div>
        </section>

        <!-- Scanner QR (placeholder) -->
        <section id="qr-section">
            <h2>📷 Scanner QR</h2>
            <!-- Le scanner sera intégré ici -->
            <div id="qr-scanner">
                <!-- Ex: html5-qrcode scanner -->
            </div>
        </section>

    </main>

    <!-- Optional: html5-qrcode lib (pour scanner QR) -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <script src="app.js"></script>
</body>
</html>
